services:
  - type: web
    name: english-a2-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && playwright install-deps chromium
    startCommand: playwright install chromium && python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://english-image.onrender.com
      - key: TZ
        value: Europe/Kyiv
      - key: PORT
        value: 10000
